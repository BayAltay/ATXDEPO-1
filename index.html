<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anteax Team - Resmi Blog</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7fa; color: #1f2937; line-height: 1.6; padding-bottom: 100px; }
        header { background-color: #0f1724; color: #ffffff; padding: 22px 0; border-bottom: 4px solid #111827; box-shadow: 0 2px 6px rgba(2,6,23,0.08); }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        .brand { font-size: 20px; font-weight: 700; color: #60a5fa; text-decoration: none; letter-spacing: 1px; }
        main { margin-top: 34px; }

        /* Kategori Filtresi */
        .category-filter { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            margin-bottom: 24px; 
            padding: 16px; 
            background-color: #ffffff; 
            border-radius: 8px; 
            border: 1px solid #e6eef6;
        }
        .category-btn { 
            padding: 8px 14px; 
            border: 2px solid #60a5fa; 
            background-color: #ffffff; 
            color: #60a5fa; 
            border-radius: 999px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .category-btn:hover { 
            background-color: #f1f9ff; 
        }
        .category-btn.active { 
            background-color: #60a5fa; 
            color: #ffffff; 
        }
        .category-btn.all { 
            border-color: #111827; 
            color: #111827;
        }
        .category-btn.all.active { 
            background-color: #111827; 
            color: #ffffff;
        }
        
        .post-card { background-color: #ffffff; border: 1px solid #e6eef6; border-radius: 10px; margin-bottom: 18px; box-shadow: 0 6px 18px rgba(15,23,42,0.03); overflow: hidden; transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .post-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(15,23,42,0.06); }
        
        .post-header { display:flex; align-items:center; justify-content:space-between; padding: 18px 20px; cursor:pointer; }
        .post-title { font-size: 18px; font-weight: 700; color: #0f1724; }
        .post-meta { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; display: flex; gap:10px; align-items:center; }
        .post-filename { color: #9ca3af; font-weight:600; font-size:12px; }
        .post-category { 
            background-color: #60a5fa; 
            color: #ffffff; 
            padding: 4px 10px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chevron { transition: transform 0.25s ease; color: #9ca3af; margin-left:12px; }
        .post-card.expanded .chevron { transform: rotate(180deg); color:#374151; }

        .post-content { padding: 0 20px 18px 20px; color:#374151; }
        .post-excerpt { padding: 0 0 12px 0; color:#4b5563; }
        .post-full { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .post-card.expanded .post-full { max-height: 4000px; }

        /* Kurumsal Markdown Metin Tasarımları */
        .post-content h1 { font-size: 22px; color: #0f1724; margin-bottom: 12px; font-weight: 700; }
        .post-content h2 { font-size: 20px; color: #0f1724; margin: 16px 0 8px 0; }
        .post-content h3 { font-size: 16px; color: #111827; margin: 12px 0 8px 0; }
        .post-content p { margin-bottom: 12px; color: #4b5563; font-size: 15px; }
        .post-content ul, .post-content ol { margin-left: 20px; margin-bottom: 12px; color: #4b5563; }
        .post-content li { margin-bottom: 6px; }
        .post-content code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 14px; color: #dc2626; }

        /* Durum Mesajları */
        .status-message { text-align: center; color: #6b7280; padding: 30px; font-weight: 500; background: #ffffff; border-radius: 8px; border: 1px solid #e6eef6; }
        .status-message.error { color: #e11d48; }
        
        .no-posts { text-align: center; color: #6b7280; padding: 24px; font-weight: 500; }
        
        footer { background-color: #0f1724; color: #9ca3af; text-align: center; padding: 18px 0; font-size: 13px; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #111827; }
        .footer-inner { display:flex; justify-content:center; gap:12px; align-items:center; }
        .version-badge { background:#111827; color:#9ca3af; padding:6px 10px; border-radius:999px; font-weight:600; font-size:12px; }

        /* Responsive */
        @media (max-width:600px) {
            .post-header { padding: 14px 16px; }
            .post-title { font-size:16px; }
            .post-content { padding: 0 16px 14px 16px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="index.html" class="brand">ANTEAX TEAM MERKEZİ BLOG</a>
        </div>
    </header>

    <main class="container" id="blogContainer">
        <div id="statusBox" class="status-message">Anteax veri ağına bağlanılıyor, dökümanlar yükleniyor...</div>
    </main>

    <footer>
        <div class="container footer-inner"><div>&copy; 2026 Anteax Team. Tüm Hakları Saklıdır.</div><div class="version-badge" id="engineVersion">ATX-B 0.4B</div></div>
    </footer>

    <script>
        // Yapılandırma
        const CONFIG = {
            username: "BayAltay",
            repo: "ATXDEPO-1",
            path: "blog",
            requestDelay: 250,
            engineVersion: "ATX-B 0.4B",
            // Eğer rate-limit sorun yaşarsan burada token ekleyebilirsin (tercihe bağlı):
            // githubToken: "ghp_..."
        };

        const apiUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.path}`;

        // Global değişkenler
        let tumBloglar = [];
        let aktifKategori = 'all';

        // Gecikme Fonksiyonu (Rate Limiting)
        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // Yardımcı fetch (opsiyonel token desteği)
        async function ghFetch(url) {
            const headers = {};
            if (CONFIG.githubToken) headers['Authorization'] = `token ${CONFIG.githubToken}`;
            return fetch(url, { headers });
        }

        // Ana Motor Fonksiyonu
        async function bloglariGetir() {
            const container = document.getElementById('blogContainer');
            const statusBox = document.getElementById('statusBox');

            try {
                const response = await ghFetch(apiUrl);
                if (!response.ok) {
                    throw new Error("GitHub veri yoluna erişilemedi. Depo adını veya klasörü kontrol edin.");
                }

                const veriler = await response.json();
                if (!Array.isArray(veriler)) {
                    throw new Error("Geçersiz API yanıtı alındı.");
                }
                
                // Sadece .md uzantılı dosyaları filtrele
                let mdDosyalari = veriler.filter(dosya => dosya.name && dosya.name.toLowerCase().endsWith('.md'));

                if (mdDosyalari.length === 0) {
                    statusBox.innerText = "Sistem klasöründe (.md) uzantılı herhangi bir döküman tespit edilemedi.";
                    return;
                }

                // Yükleniyor yazısını kaldır (biz henüz kartları eklemeden önce)
                statusBox.style.display = "none";

                // Her dosya için en son commit bilgisini alarak tarihe göre sırala (yeniden düzenlenmiş: en yeni önce)
                for (const dosya of mdDosyalari) {
                    await delay(CONFIG.requestDelay);
                    try {
                        const commitsUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/commits?path=${CONFIG.path}/${encodeURIComponent(dosya.name)}&per_page=1`;
                        const commitsResp = await ghFetch(commitsUrl);
                        if (commitsResp && commitsResp.ok) {
                            const commits = await commitsResp.json();
                            if (Array.isArray(commits) && commits.length > 0 && commits[0].commit && commits[0].commit.author && commits[0].commit.author.date) {
                                dosya._lastModified = new Date(commits[0].commit.author.date).getTime();
                            } else {
                                dosya._lastModified = 0; // fallback
                            }
                        } else {
                            dosya._lastModified = 0; // fallback
                        }
                    } catch (e) {
                        console.warn('Commit bilgisi alınamadı için fallback kullanılıyor:', dosya.name, e);
                        dosya._lastModified = 0;
                    }
                }

                // Dosyaları son değişiklik tarihine göre (desc) sırala
                mdDosyalari.sort((a,b) => (b._lastModified || 0) - (a._lastModified || 0));

                // Dosyaları sırayla oku ve ekrana bas
                for (const dosya of mdDosyalari) {
                    await delay(CONFIG.requestDelay);
                    await renderBlogPost(dosya, container);
                }

                // Kategori filtresi oluştur
                kategoriFilteriOlustur();

            } catch (anaHata) {
                statusBox.classList.add('error');
                statusBox.innerText = `Bağlantı Başarısız: ${anaHata.message}`;
                console.error("Sistem Hatası:", anaHata);
            }
        }

        // Blog Yazısını Render Et
        async function renderBlogPost(dosya, container) {
            try {
                const dosyaResponse = await ghFetch(dosya.download_url);
                if (!dosyaResponse.ok) {
                    throw new Error(`${dosya.name} indirilemedi`);
                }

                const markdownMetni = await dosyaResponse.text();

                // Eski tarz category: satırını bul (geri uyumluluk için) - ama frontmatter desteği YOK
                const kategoriRegex = /^category:\s*(.+?)$/m;
                const kategoriMatch = markdownMetni.match(kategoriRegex);
                const kategori = kategoriMatch ? kategoriMatch[1].trim() : "Diğer";

                // Başlık: önce markdown içindeki ilk H1'i al, yoksa dosya adından başlık üret
                const baslikMatch = markdownMetni.match(/^#\s+(.+)$/m);
                const baslik = baslikMatch ? baslikMatch[1].trim() : dosya.name.replace(/\.md$/i, '').replace(/[-_]/g, ' ');

                // Özet: ilk boş olmayan paragraf (başlık satırını atla)
                const temizIcerik = markdownMetni.replace(/^category:.*$/m, '').trim();
                const paragraflar = temizIcerik.split(/\n\s*\n/).map(p=>p.trim()).filter(p=>p.length>0 && !p.startsWith('#'));
                const excerpt = paragraflar.length>0 ? paragraflar[0] : '';

                // Markdown'ı HTML koduna dönüştür
                const htmlIcerik = marked.parse(temizIcerik);
                const cleanHtml = DOMPurify.sanitize(htmlIcerik);

                // Yeni kart yapısını oluştur
                const kart = document.createElement('article');
                kart.className = 'post-card';
                kart.setAttribute('data-category', kategori.toLowerCase());

                // Header (clickable)
                const headerDiv = document.createElement('div');
                headerDiv.className = 'post-header';
                headerDiv.tabIndex = 0;
                headerDiv.setAttribute('role','button');
                headerDiv.setAttribute('aria-expanded','false');

                const leftDiv = document.createElement('div');
                leftDiv.style.display = 'flex';
                leftDiv.style.flexDirection = 'column';

                const titleSpan = document.createElement('div');
                titleSpan.className = 'post-title';
                titleSpan.textContent = baslik;

                const metaSmall = document.createElement('div');
                metaSmall.className = 'post-meta';

                const filenameSpan = document.createElement('span');
                filenameSpan.className = 'post-filename';
                filenameSpan.textContent = `Sistem Arşivi: ${dosya.name}`;

                const categorySpan = document.createElement('span');
                categorySpan.className = 'post-category';
                categorySpan.textContent = kategori;

                metaSmall.appendChild(filenameSpan);
                metaSmall.appendChild(categorySpan);

                leftDiv.appendChild(titleSpan);
                leftDiv.appendChild(metaSmall);

                const rightDiv = document.createElement('div');
                rightDiv.style.display = 'flex';
                rightDiv.style.alignItems = 'center';

                const chevron = document.createElement('span');
                chevron.className = 'chevron';
                chevron.innerHTML = '▾';

                rightDiv.appendChild(chevron);

                headerDiv.appendChild(leftDiv);
                headerDiv.appendChild(rightDiv);

                // İçerik alanı: excerpt (her zaman görünen) + full (expand ile açılan)
                const contentDiv = document.createElement('div');
                contentDiv.className = 'post-content';

                const excerptDiv = document.createElement('div');
                excerptDiv.className = 'post-excerpt';
                excerptDiv.textContent = excerpt ? excerpt.replace(/\n/g,' ') : '';

                const fullDiv = document.createElement('div');
                fullDiv.className = 'post-full';
                fullDiv.innerHTML = cleanHtml;

                contentDiv.appendChild(excerptDiv);
                contentDiv.appendChild(fullDiv);

                kart.appendChild(headerDiv);
                kart.appendChild(contentDiv);
                container.appendChild(kart);

                // Event: toggle expand/collapse
                function toggleExpand() {
                    const expanded = kart.classList.toggle('expanded');
                    headerDiv.setAttribute('aria-expanded', expanded ? 'true' : 'false');
                    // Scroll into view smoothly when expanding on small screens
                    if (expanded) {
                        setTimeout(()=> kart.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
                    }
                }

                headerDiv.addEventListener('click', toggleExpand);
                headerDiv.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        toggleExpand();
                    }
                });

                // Blog nesnesini kaydet
                tumBloglar.push({
                    kategori: kategori.toLowerCase(),
                    element: kart,
                    lastModified: dosya._lastModified || 0
                });

            } catch (dosyaHatasi) {
                console.error(`${dosya.name} işlenirken hata:`, dosyaHatasi);
            }
        }

        // Kategori Filtresi Oluştur
        function kategoriFilteriOlustur() {
            // Unique kategoriler bul
            const kategoriler = new Set(tumBloglar.map(blog => blog.kategori));
            const sortedKategoriler = Array.from(kategoriler).sort();

            // Filtre containerını oluştur
            const container = document.getElementById('blogContainer');
            const filterDiv = document.createElement('div');
            filterDiv.className = 'category-filter';
            filterDiv.id = 'categoryFilter';

            // "Tüm Yazılar" butonu
            const allBtn = document.createElement('button');
            allBtn.className = 'category-btn all active';
            allBtn.textContent = 'Tüm Yazılar';
            allBtn.setAttribute('data-category', 'all');
            allBtn.addEventListener('click', () => kategoriAra('all'));
            filterDiv.appendChild(allBtn);

            // Kategori butonları
            sortedKategoriler.forEach(kategori => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = kategori;
                btn.setAttribute('data-category', kategori);
                btn.addEventListener('click', () => kategoriAra(kategori));
                filterDiv.appendChild(btn);
            });

            // Filtre div'ini containerın başına ekle (ilk önce)
            container.insertBefore(filterDiv, container.firstChild);
        }

        // Kategori Arama Fonksiyonu
        function kategoriAra(secilenKategori) {
            aktifKategori = secilenKategori;

            // Butonları güncelle
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            const selector = document.querySelector(`[data-category="${secilenKategori}"]`);
            if (selector) selector.classList.add('active');

            // Yazıları filtrele
            let gorunenYazi = 0;
            tumBloglar.forEach(blog => {
                if (secilenKategori === 'all' || blog.kategori === secilenKategori) {
                    blog.element.style.display = '';
                    gorunenYazi++;
                } else {
                    blog.element.style.display = 'none';
                }
            });

            // Eğer yazı yoksa mesaj göster
            if (gorunenYazi === 0) {
                let mesajDiv = document.getElementById('noPostsMessage');
                if (!mesajDiv) {
                    mesajDiv = document.createElement('div');
                    mesajDiv.id = 'noPostsMessage';
                    mesajDiv.className = 'no-posts';
                    document.getElementById('categoryFilter').parentNode.insertBefore(mesajDiv, document.getElementById('categoryFilter').nextSibling);
                }
                mesajDiv.textContent = `'${secilenKategori}' kategorisinde yazı bulunamadı.`;
            } else {
                let mesajDiv = document.getElementById('noPostsMessage');
                if (mesajDiv) {
                    mesajDiv.remove();
                }
            }
        }

        // Footer sürümünü ayarla (dinamik)
        document.addEventListener('DOMContentLoaded', () => {
            const verSpan = document.getElementById('engineVersion');
            if (verSpan) verSpan.textContent = CONFIG.engineVersion;
        });

        // Sayfa yüklendiğinde motoru çalıştır
        window.addEventListener('DOMContentLoaded', bloglariGetir);
    </script>
</body>
</html>
